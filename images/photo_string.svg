<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 80" width="1000" height="80">
  <!-- Main horizontal rope -->
  <line x1="0" y1="40" x2="1000" y2="40" stroke="#8c6a47" stroke-width="3" stroke-linecap="round"/>
  <!-- Rope texture lines -->
  <line x1="0" y1="38" x2="1000" y2="38" stroke="#a67c52" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <line x1="0" y1="42" x2="1000" y2="42" stroke="#7a5a3a" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- Knots at intervals -->
  <circle cx="100" cy="40" r="4" fill="#8c6a47"/>
  <circle cx="300" cy="40" r="4" fill="#8c6a47"/>
  <circle cx="500" cy="40" r="4" fill="#8c6a47"/>
  <circle cx="700" cy="40" r="4" fill="#8c6a47"/>
  <circle cx="900" cy="40" r="4" fill="#8c6a47"/>
</svg>